<body>
    <!-- Header will be loaded dynamically -->

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        // Platform detection and auto-redirect
        (function() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
            const isAndroid = /android/i.test(userAgent);
            
            // App store URLs
            const androidUrl = 'https://play.google.com/store/apps/details?id=com.thanh_nguyen.tet_count_down';
            const iosUrl = 'https://apps.apple.com/gb/app/s%E1%BA%AFp-t%E1%BA%BFt-%C4%91%E1%BA%BFm-ng%C6%B0%E1%BB%A3c-t%E1%BA%BFt-2026/id6743064990?platform=iphone';
            
            // Show redirecting message
            const redirectingMessage = document.getElementById('redirecting-message');
            const platformInfo = document.getElementById('platform-info');
            const downloadButtons = document.getElementById('download-buttons');
            
            // Auto-redirect for mobile devices
            if (isIOS) {
                // iOS device - redirect to App Store
                platformInfo.innerHTML = '<p>📱 Đã phát hiện thiết bị iOS. Đang chuyển hướng đến App Store...</p>';
                redirectingMessage.style.display = 'block';
                
                // Redirect after a short delay to show the message
                setTimeout(() => {
                    window.location.href = iosUrl;
                }, 1000);
            } else if (isAndroid) {
                // Android device - redirect to Google Play
                platformInfo.innerHTML = '<p>🤖 Đã phát hiện thiết bị Android. Đang chuyển hướng đến Google Play...</p>';
                redirectingMessage.style.display = 'block';
                
                // Redirect after a short delay to show the message
                setTimeout(() => {
                    window.location.href = androidUrl;
                }, 1000);
            } else {
                // Desktop or other platform - show both options
                platformInfo.innerHTML = '<p>💻 Chọn nền tảng phù hợp với thiết bị của bạn hoặc quét mã QR để tải về</p>';
            }
            
            // Track download clicks
            document.getElementById('android-btn').addEventListener('click', function() {
                console.log('Android download clicked');
                // Add analytics tracking here if needed
            });
            
            document.getElementById('ios-btn').addEventListener('click', function() {
                console.log('iOS download clicked');
                // Add analytics tracking here if needed
            });
        })();
    </script>
