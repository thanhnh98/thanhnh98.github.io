name: Daily Tết SEO snippet update

on:
  schedule:
    # 00:00 Asia/Ho_Chi_Minh (17:00 UTC)
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-seo-snippets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Inject Tết SEO snippets
        run: node scripts/inject-tet-seo-snippets.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html con-bao-nhieu-ngay-nua-den-tet/index.html con-bao-nhieu-ngay-nua-den-giao-thua/index.html
          if git diff --staged --quiet; then
            echo "No SEO snippet changes."
            exit 0
          fi
          git commit -m "chore(seo): refresh Tết day-count snippets [skip ci]"
          git push
