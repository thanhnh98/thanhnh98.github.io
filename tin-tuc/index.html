    <script>
        var fallbackNewsPosts = [];
        var allNewsPosts = [];
        var activeCategoryFilters = [];

        function formatDate(isoDate) {
            var date = new Date(isoDate);
            if (isNaN(date.getTime())) {
                return isoDate || "";
            }
            return date.toLocaleDateString("vi-VN", {
                day: "2-digit",
                month: "2-digit",
                year: "numeric"
            });
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function formatCategory(category) {
            var raw = String(category || "general").trim();
            if (!raw) return "Tổng hợp";
            var key = raw.toLowerCase();
            var categoryMap = {
                general: "Tổng hợp",
                economy: "Kinh tế",
                policy: "Chính sách",
                society: "Xã hội",
                transport: "Giao thông",
                energy: "Năng lượng",
                technology: "Công nghệ",
                entertainment: "Giải trí",
                health: "Sức khỏe",
                education: "Giáo dục",
                travel: "Du lịch",
                commerce: "Thương mại",
                sports: "Thể thao",
                lifestyle: "Đời sống"
            };
            if (categoryMap[key]) return categoryMap[key];
            var normalized = key.replace(/[_-]+/g, " ");
            return normalized.charAt(0).toUpperCase() + normalized.slice(1);
        }

        function toTitleSlug(value) {
            return String(value || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/đ/g, "d")
                .replace(/Đ/g, "d")
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-+|-+$/g, "")
                .replace(/-{2,}/g, "-");
        }

        function resolveDetailUrl(detailPage, sourcePath) {
            if (!detailPage) return "";
            if (/^https?:\/\//i.test(detailPage)) return detailPage;
            var cleaned = String(detailPage).replace(/^\.\//, "");
            if (!cleaned) return "";
            return "/" + cleaned;
        }

        function normalizePost(post, sourcePath) {
            var sourceName = post && post.source && post.source.name ? post.source.name : "Sắp Tết";
            var summary = post.summary || post.description || "";
            var detailUrl = resolveDetailUrl(post.detailPage, sourcePath);
            var canonicalUrl = post.links && post.links.canonicalUrl ? post.links.canonicalUrl : (post.source && post.source.url ? post.source.url : "");
            var affiliateData = post.affiliate && typeof post.affiliate === "object" ? post.affiliate : null;
            var affiliateUrl = affiliateData && affiliateData.url
                ? affiliateData.url
                : (post.links && post.links.useAffiliate && post.links.affiliateUrl ? post.links.affiliateUrl : "");
            var affiliateThumbnail = affiliateData && affiliateData.thumbnail ? affiliateData.thumbnail : "";
            var affiliateName = affiliateData && affiliateData.name ? affiliateData.name : "Sản phẩm liên quan";
            var affiliateDescription = affiliateData && affiliateData.description ? affiliateData.description : "";
            var affiliateBuyText = affiliateData && affiliateData.buyText ? affiliateData.buyText : "Xem sản phẩm";

            return {
                id: post.id || "",
                title: post.title || "Bài viết mới",
                summary: summary,
                category: post.category || "general",
                slug: post.slug || "",
                publishedAt: post.publishedAt || "",
                author: post.author || "Sắp Tết Team",
                tags: Array.isArray(post.tags) ? post.tags : [],
                sourceName: sourceName,
                thumbnailUrl: post.thumbnailUrl || "/assets/images/img_sharing.png",
                detailUrl: detailUrl,
                canonicalUrl: canonicalUrl,
                affiliateUrl: affiliateUrl,
                affiliate: affiliateData,
                affiliateThumbnail: affiliateThumbnail,
                affiliateName: affiliateName,
                affiliateDescription: affiliateDescription,
                affiliateBuyText: affiliateBuyText,
                hasAds: !!affiliateUrl
            };
        }

        function renderFeatured(post) {
            var featuredEl = document.getElementById("featured-post");
            if (!featuredEl) return;
            if (!post) {
                featuredEl.innerHTML = "<div class='news-empty'>Chưa có bài nổi bật.</div>";
                return;
            }

            var readUrl = post.detailUrl || post.canonicalUrl || "#";

            featuredEl.innerHTML =
                "<a class='featured-thumb-link' href='" + escapeHtml(readUrl) + "' data-news-track='1' data-click-area='featured_image' data-article-id='" + escapeHtml(post.id) + "' data-article-title='" + escapeHtml(post.title) + "' data-article-slug='" + escapeHtml(post.slug || toTitleSlug(post.title)) + "' data-article-category='" + escapeHtml(post.category) + "' data-article-position='0'>" +
                    "<img class='featured-thumb' src='" + escapeHtml(post.thumbnailUrl) + "' alt='" + escapeHtml(post.title) + "' loading='lazy'>" +
                "</a>" +
                "<div class='featured-body'>" +
                    "<div class='featured-meta'>" +
                        "<span class='news-source'>" + escapeHtml(post.sourceName) + "</span>" +
                        "<span class='news-source'>" + escapeHtml(formatCategory(post.category)) + "</span>" +
                        "<span>" + escapeHtml(formatDate(post.publishedAt)) + "</span>" +
                        "<span>Tác giả: " + escapeHtml(post.author) + "</span>" +
                    "</div>" +
                    "<a class='featured-title-link' href='" + escapeHtml(readUrl) + "' data-news-track='1' data-click-area='featured_title' data-article-id='" + escapeHtml(post.id) + "' data-article-title='" + escapeHtml(post.title) + "' data-article-slug='" + escapeHtml(post.slug || toTitleSlug(post.title)) + "' data-article-category='" + escapeHtml(post.category) + "' data-article-position='0'>" +
                        "<h2>" + escapeHtml(post.title) + "</h2>" +
                    "</a>" +
                    "<p class='featured-excerpt'>" + escapeHtml(post.summary) + "</p>" +
                    "<div class='news-link-group'>" +
                        "<a class='news-link' href='" + escapeHtml(readUrl) + "' data-news-track='1' data-click-area='featured_button' data-article-id='" + escapeHtml(post.id) + "' data-article-title='" + escapeHtml(post.title) + "' data-article-slug='" + escapeHtml(post.slug || toTitleSlug(post.title)) + "' data-article-category='" + escapeHtml(post.category) + "' data-article-position='0'>Xem bài viết</a>" +
                        "<button class='news-share-btn news-share-icon-btn' type='button' aria-label='Chia sẻ bài viết' title='Chia sẻ bài viết' data-news-share='1' data-share-url='" + escapeHtml(readUrl) + "' data-article-id='" + escapeHtml(post.id) + "' data-article-title='" + escapeHtml(post.title) + "' data-article-slug='" + escapeHtml(post.slug || toTitleSlug(post.title)) + "' data-article-category='" + escapeHtml(post.category) + "' data-article-position='0'>" +
                            "<svg class='news-share-icon' viewBox='0 0 24 24' aria-hidden='true'><circle cx='18' cy='5' r='3'></circle><circle cx='6' cy='12' r='3'></circle><circle cx='18' cy='19' r='3'></circle><path d='M8.59 13.51l6.83 3.98M15.41 6.51L8.59 10.49'></path></svg>" +
                        "</button>" +
                    "</div>" +
                "</div>";
        }

        function renderNews(posts) {
            var listEl = document.getElementById("news-list");
            if (!listEl) return;

            if (!Array.isArray(posts) || posts.length === 0) {
                listEl.innerHTML = "<div class='news-empty'>Chưa có bài viết nào. Vui lòng quay lại sau.</div>";
                return;
            }

            listEl.innerHTML = posts.map(function(post, index) {
                var detailUrl = post.detailUrl || post.canonicalUrl || "#";
                var position = index + 1;
                return (
                    "<article class='news-card'>" +
                        "<a href='" + escapeHtml(detailUrl) + "' class='news-card-thumb-link' data-news-track='1' data-click-area='card_image' data-article-id='" + escapeHtml(post.id) + "' data-article-title='" + escapeHtml(post.title) + "' data-article-slug='" + escapeHtml(post.slug || toTitleSlug(post.title)) + "' data-article-category='" + escapeHtml(post.category) + "' data-article-position='" + position + "'>" +
                            "<img class='news-card-thumb' src='" + escapeHtml(post.thumbnailUrl) + "' alt='" + escapeHtml(post.title) + "' loading='lazy'>" +
                        "</a>" +
                        "<div class='news-card-body'>" +
                            "<div class='news-card-meta'>" +
                                "<span class='news-source'>" + escapeHtml(formatCategory(post.category)) + "</span>" +
                                "<span class='news-card-date'>" + escapeHtml(formatDate(post.publishedAt)) + "</span>" +
                            "</div>" +
                            "<a href='" + escapeHtml(detailUrl) + "' class='news-card-title-link' data-news-track='1' data-click-area='card_title' data-article-id='" + escapeHtml(post.id) + "' data-article-title='" + escapeHtml(post.title) + "' data-article-slug='" + escapeHtml(post.slug || toTitleSlug(post.title)) + "' data-article-category='" + escapeHtml(post.category) + "' data-article-position='" + position + "'>" +
                                "<h3 class='news-card-title'>" + escapeHtml(post.title) + "</h3>" +
                            "</a>" +
                            "<p class='news-card-desc'>" + escapeHtml(post.summary) + "</p>" +
                            "<p class='news-card-author'>Nguồn: " + escapeHtml(post.sourceName) + " - " + escapeHtml(post.author) + "</p>" +
                            "<div class='news-link-group'>" +
                                "<a class='news-link' href='" + escapeHtml(detailUrl) + "' data-news-track='1' data-click-area='card_button' data-article-id='" + escapeHtml(post.id) + "' data-article-title='" + escapeHtml(post.title) + "' data-article-slug='" + escapeHtml(post.slug || toTitleSlug(post.title)) + "' data-article-category='" + escapeHtml(post.category) + "' data-article-position='" + position + "'>Xem bài viết</a>" +
                                "<button class='news-share-btn news-share-icon-btn' type='button' aria-label='Chia sẻ bài viết' title='Chia sẻ bài viết' data-news-share='1' data-share-url='" + escapeHtml(detailUrl) + "' data-article-id='" + escapeHtml(post.id) + "' data-article-title='" + escapeHtml(post.title) + "' data-article-slug='" + escapeHtml(post.slug || toTitleSlug(post.title)) + "' data-article-category='" + escapeHtml(post.category) + "' data-article-position='" + position + "'>" +
                                    "<svg class='news-share-icon' viewBox='0 0 24 24' aria-hidden='true'><circle cx='18' cy='5' r='3'></circle><circle cx='6' cy='12' r='3'></circle><circle cx='18' cy='19' r='3'></circle><path d='M8.59 13.51l6.83 3.98M15.41 6.51L8.59 10.49'></path></svg>" +
                                "</button>" +
                            "</div>" +
                        "</div>" +
                    "</article>"
                );
            }).join("");
        }

        async function shareNewsLink(url, title) {
            if (!url) return false;
            var absoluteUrl = /^https?:\/\//i.test(url) ? url : (window.location.origin + url);
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: title || document.title,
                        text: title || "",
                        url: absoluteUrl
                    });
                    return true;
                } catch (error) {
                    if (error && error.name === "AbortError") return false;
                }
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                try {
                    await navigator.clipboard.writeText(absoluteUrl);
                    return true;
                } catch (error) {
                    // fallback below
                }
            }
            var tempInput = document.createElement("input");
            tempInput.value = absoluteUrl;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            return true;
        }

        function collectCategories(posts) {
            var counts = {};
            (posts || []).forEach(function(post) {
                var key = String(post.category || "").trim();
                if (!key) return;
                counts[key] = (counts[key] || 0) + 1;
            });
            return Object.keys(counts)
                .sort(function(a, b) {
                    if (counts[b] !== counts[a]) return counts[b] - counts[a];
                    return formatCategory(a).localeCompare(formatCategory(b), "vi");
                })
                .map(function(category) {
                    return { key: category, count: counts[category] };
                });
        }

        function renderTagFilters(posts) {
            var wrap = document.getElementById("news-tag-filters");
            if (!wrap) return;
            var categories = collectCategories(posts);
            if (!categories.length) {
                wrap.innerHTML = "<p>Chưa có chủ đề để lọc.</p>";
                return;
            }

            var html = "<button class='news-tag-filter-btn" + (activeCategoryFilters.length === 0 ? " is-active" : "") + "' data-tag-filter='all' type='button'>Tất cả</button>";
            html += categories.map(function(category) {
                var isActive = activeCategoryFilters.indexOf(category.key) >= 0;
                return (
                    "<button class='news-tag-filter-btn" + (isActive ? " is-active" : "") + "' data-tag-filter='" + escapeHtml(category.key) + "' type='button'>" +
                        escapeHtml(formatCategory(category.key)) + " (" + category.count + ")" +
                    "</button>"
                );
            }).join("");
            wrap.innerHTML = html;
        }

        function applyTagFilter(posts, selectedCategories) {
            if (!Array.isArray(selectedCategories) || selectedCategories.length === 0) return posts.slice();
            return posts.filter(function(post) {
                return selectedCategories.indexOf(post.category) >= 0;
            });
        }

        function rerenderNewsByFilter() {
            var filtered = applyTagFilter(allNewsPosts, activeCategoryFilters);
            renderFeatured(filtered[0] || null);
            renderNews(filtered.slice(1));
            renderTagFilters(allNewsPosts);
        }

        function trackNewsClick(element) {
            if (!element || !window.webAnalytics || !window.webAnalytics.trackEvent) return;
            var articleTitle = element.getAttribute('data-article-title') || '';
            var articleSlug = element.getAttribute('data-article-slug') || toTitleSlug(articleTitle);
            window.webAnalytics.trackEvent('news_article_open', {
                title: articleSlug,
                article_id: element.getAttribute('data-article-id') || '',
                article_title: articleTitle,
                article_category: element.getAttribute('data-article-category') || '',
                article_position: Number(element.getAttribute('data-article-position') || -1),
                click_area: element.getAttribute('data-click-area') || 'unknown',
                page_path: window.location.pathname
            });
        }

        function normalizeNewsPayload(payload) {
            if (!payload) return [];
            if (Array.isArray(payload)) return payload;
            if (Array.isArray(payload.items)) return payload.items;
            if (Array.isArray(payload.posts)) return payload.posts;
            return [];
        }

        function fetchJson(url) {
            return fetch(url).then(function(res) {
                if (!res.ok) {
                    throw new Error("HTTP " + res.status + " when fetching " + url);
                }
                return res.json();
            });
        }

        function loadNewsData() {
            var candidates = ["/news.json", "../news.json"];
            var chain = Promise.reject();
            var selectedSourcePath = "";

            candidates.forEach(function(url) {
                chain = chain.catch(function() {
                    return fetchJson(url).then(function(payload) {
                        selectedSourcePath = url;
                        return payload;
                    });
                });
            });

            return chain.then(function(payload) {
                var posts = normalizeNewsPayload(payload).map(function(item) {
                    return normalizePost(item, selectedSourcePath);
                }).sort(function(a, b) {
                    return new Date(b.publishedAt).getTime() - new Date(a.publishedAt).getTime();
                });

                allNewsPosts = posts;
                renderTagFilters(allNewsPosts);
                rerenderNewsByFilter();
            }).catch(function(error) {
                console.warn("Cannot load news.json from candidate paths:", error);
                allNewsPosts = fallbackNewsPosts.slice();
                renderTagFilters(allNewsPosts);
                rerenderNewsByFilter();
            });
        }

        loadNewsData();

        document.addEventListener('click', function(event) {
            var target = event.target.closest('a[data-news-track="1"]');
            if (!target) return;
            trackNewsClick(target);
        });

        document.addEventListener('click', function(event) {
            var btn = event.target.closest('button[data-tag-filter]');
            if (!btn) return;
            var key = btn.getAttribute('data-tag-filter') || "all";
            if (key === "all") {
                activeCategoryFilters = [];
            } else {
                var idx = activeCategoryFilters.indexOf(key);
                if (idx >= 0) {
                    activeCategoryFilters.splice(idx, 1);
                } else {
                    activeCategoryFilters.push(key);
                }
            }
            rerenderNewsByFilter();
        });

        document.addEventListener('click', async function(event) {
            var shareBtn = event.target.closest('button[data-news-share="1"]');
            if (!shareBtn) return;
            event.preventDefault();
            var shareUrl = shareBtn.getAttribute('data-share-url') || '';
            var articleTitle = shareBtn.getAttribute('data-article-title') || '';
            var shared = await shareNewsLink(shareUrl, articleTitle);
            if (shared && window.webAnalytics && window.webAnalytics.trackEvent) {
                window.webAnalytics.trackEvent('news_article_share', {
                    article_id: shareBtn.getAttribute('data-article-id') || '',
                    article_slug: shareBtn.getAttribute('data-article-slug') || '',
                    article_title: articleTitle,
                    article_category: shareBtn.getAttribute('data-article-category') || '',
                    article_position: Number(shareBtn.getAttribute('data-article-position') || -1),
                    share_url: shareUrl
                });
            }
        });
    </script>
